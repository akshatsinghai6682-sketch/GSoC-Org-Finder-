name: 🏆 Update Mentor Leaderboard

on:
  schedule:
    - cron: '0 */6 * * *'

  workflow_dispatch:

permissions:
  contents: write
  pull-requests: read
  issues: read

concurrency:
  group: mentor-leaderboard
  cancel-in-progress: false

jobs:
  generate-leaderboard:
    name: Generate Mentor Leaderboard

    runs-on: ubuntu-latest

    steps:
      # ----------------------------------------
      # CHECKOUT
      # ----------------------------------------

      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      # ----------------------------------------
      # SETUP NODE
      # ----------------------------------------

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # ----------------------------------------
      # GENERATE LEADERBOARD
      # ----------------------------------------

      - name: Generate mentor leaderboard
        run: |
          node .github/scripts/generate-mentor-leaderboard.js

      # ----------------------------------------
      # UPDATE README SECTION
      # ----------------------------------------

      - name: Sync leaderboard into README
        run: |
          node - <<'EOF'
          const fs = require('fs');

          const readmePath = 'README.md';

          const leaderboardPath =
            '.github/reviewers/mentor-leaderboard.md';

          if (
            !fs.existsSync(readmePath) ||
            !fs.existsSync(leaderboardPath)
          ) {
            console.log('README or leaderboard missing');
            process.exit(0);
          }

          const leaderboard =
            fs.readFileSync(
              leaderboardPath,
              'utf8'
            );

          let readme =
            fs.readFileSync(
              readmePath,
              'utf8'
            );

          const START =
            '<!-- mentor-leaderboard:start -->';

          const END =
            '<!-- mentor-leaderboard:end -->';

          const block =
            `${START}\n\n${leaderboard}\n\n${END}`;

          const regex =
            new RegExp(
              `${START}[\\s\\S]*?${END}`,
              'm'
            );

          if (regex.test(readme)) {

            readme =
              readme.replace(regex, block);

          } else {

            readme +=
              `\n\n${block}\n`;
          }

          fs.writeFileSync(
            readmePath,
            readme
          );

          console.log(
            'README leaderboard synced'
          );
          EOF

      # ----------------------------------------
      # COMMIT CHANGES
      # ----------------------------------------

      - name: Commit leaderboard updates
        run: |
          git config user.name \
            "github-actions[bot]"

          git config user.email \
            "41898282+github-actions[bot]@users.noreply.github.com"

          git add \
            README.md \
            .github/reviewers/mentor-leaderboard.md

          git diff --cached --quiet && exit 0

          git commit -m \
            "chore: update mentor leaderboard"

          git push